<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galería de Graduación</title>
  <meta name="description" content="Galería de fotos de mi graduación">
  <meta name="theme-color" content="#0a1128">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
</head>
<body>

  <header class="hero" id="hero">
    <div class="hero-glow" aria-hidden="true"></div>
    <div class="hero-content">
      <p class="hero-kicker" id="hero-degree">Graduación</p>
      <h1 class="hero-name" id="hero-name">Álvaro</h1>
      <div class="hero-divider" aria-hidden="true">
        <span class="line"></span><span class="cap">🎓</span><span class="line"></span>
      </div>
      <p class="hero-tagline" id="hero-tagline">Un día para recordar siempre</p>
      <p class="hero-date" id="hero-date">2026</p>
    </div>
    <a class="hero-scroll" href="#galeria" aria-label="Bajar a la galería">
      <span class="hero-scroll-text">Ver las fotos</span>
      <span class="hero-scroll-arrow" aria-hidden="true"></span>
    </a>
  </header>

  <main id="galeria" class="gallery-section">
    <h2 class="gallery-title">Los recuerdos</h2>
    <p class="gallery-count" id="gallery-count" aria-live="polite"></p>

    <div class="gallery-toolbar" id="gallery-toolbar" hidden>
      <div class="seg" role="group" aria-label="Filtrar fotos">
        <button class="seg-btn is-active" id="filter-all" type="button" aria-pressed="true">Todas</button>
        <button class="seg-btn" id="filter-favs" type="button" aria-pressed="false">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M20.8 6.6a5 5 0 0 0-7.1 0L12 8.3l-1.7-1.7a5 5 0 1 0-7.1 7.1L12 21l8.8-7.3a5 5 0 0 0 0-7.1z"/></svg>
          Favoritas <span class="seg-count" id="fav-count">0</span>
        </button>
      </div>
      <button class="tool-btn" id="slideshow-btn" type="button">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
        Pase de diapositivas
      </button>
    </div>

    <div class="gallery" id="gallery"></div>

    <p class="gallery-empty" id="gallery-empty" hidden>
      Aún no has marcado ninguna foto como favorita. Pulsa el corazón ♥ de una foto para guardarla aquí.
    </p>

    <div class="gallery-status" id="gallery-status">
      <span class="spinner" aria-hidden="true"></span> Cargando fotos…
    </div>
  </main>

  <footer class="footer">
    <p>Hecho con <span class="gold">♥</span> para un día inolvidable</p>
  </footer>

  <!-- Lightbox (visor a pantalla completa) -->
  <div class="lightbox" id="lightbox" role="dialog" aria-modal="true" aria-label="Visor de fotos" hidden>
    <div class="lb-backdrop" data-lb-close></div>
    <div class="lb-stage" id="lb-stage">
      <img class="lb-img" id="lb-img" alt="" draggable="false">
      <video class="lb-video" id="lb-video" playsinline controls hidden></video>
      <span class="spinner lb-spinner" id="lb-spinner" hidden aria-hidden="true"></span>
    </div>
    <div class="lb-progress-track" aria-hidden="true"><span class="lb-progress" id="lb-progress"></span></div>
    <div class="lb-topbar">
      <span class="lb-counter" id="lb-counter"></span>
      <div class="lb-actions">
        <button class="lb-btn lb-fav" id="lb-fav" type="button" title="Favorita (F)" aria-label="Marcar como favorita" aria-pressed="false">
          <svg class="heart-outline" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.8 6.6a5 5 0 0 0-7.1 0L12 8.3l-1.7-1.7a5 5 0 1 0-7.1 7.1L12 21l8.8-7.3a5 5 0 0 0 0-7.1z"/></svg>
          <svg class="heart-fill" viewBox="0 0 24 24" width="22" height="22" fill="currentColor" aria-hidden="true"><path d="M12 21s-7.5-4.9-10-9.3C.4 8.6 1.9 5 5.2 5c2 0 3.3 1.1 4.1 2.2C10.1 6.1 11.4 5 13.4 5c3.3 0 4.8 3.6 3.2 6.7C18.9 16.1 12 21 12 21z"/></svg>
        </button>
        <button class="lb-btn" id="lb-play" type="button" title="Pase de diapositivas (espacio)" aria-label="Iniciar pase de diapositivas">
          <svg class="icon-play" viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg class="icon-pause" viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>
        </button>
        <button class="lb-btn" id="lb-share" type="button" title="Compartir" aria-label="Compartir foto">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/><line x1="15.4" y1="6.5" x2="8.6" y2="10.5"/></svg>
        </button>
        <a class="lb-btn" id="lb-download" href="#" download title="Descargar original" aria-label="Descargar foto original">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </a>
        <button class="lb-btn" id="lb-close" title="Cerrar (Esc)" aria-label="Cerrar visor">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </div>
    <button class="lb-nav lb-prev" id="lb-prev" title="Anterior (←)" aria-label="Foto anterior">
      <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="lb-nav lb-next" id="lb-next" title="Siguiente (→)" aria-label="Foto siguiente">
      <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <p class="lb-hint" id="lb-hint">Doble toque o rueda para hacer zoom</p>
  </div>

  <!-- Botón flotante para volver arriba -->
  <button class="scroll-top" id="scroll-top" type="button" aria-label="Volver arriba">
    <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="18 15 12 9 6 15"/></svg>
  </button>

  <!-- Aviso flotante (feedback breve) -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="js/config.js"></script>
  <script src="js/app-utils.js"></script>
  <script src="js/lightbox.js"></script>
  <script src="js/gallery.js"></script>
</body>
</html>
